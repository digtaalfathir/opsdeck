name: Release

on:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: app
      - run: npm run dist:win -- --publish never
        working-directory: app
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" app/dist/Opsdeck-Setup-*.exe \
            --title "Opsdeck $GITHUB_REF_NAME" --generate-notes
