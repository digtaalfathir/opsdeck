<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Factory Monitoring</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    h2 {
      text-align: center;
    }

    #status {
      text-align: center;
      margin-bottom: 20px;
      font-size: 14px;
      color: #aaa;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .machine {
      width: 180px;
      height: 100px;
      margin: 10px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .UP {
      background: #00c853;
    }

    .DOWN {
      background: #d50000;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>

<h2>Factory Monitoring</h2>
<div id="status">Connecting...</div>
<div class="grid" id="grid"></div>

<script>
const SERVER_IP = "10.10.1.210"; // GANTI dengan IP server kamu
const ws = new WebSocket(`ws://${SERVER_IP}:10011`);

const statusText = document.getElementById("status");
const grid = document.getElementById("grid");

ws.onopen = () => {
  statusText.innerText = "Connected";
  statusText.style.color = "#00c853";
};

ws.onclose = () => {
  statusText.innerText = "Disconnected";
  statusText.style.color = "#d50000";
};

ws.onerror = () => {
  statusText.innerText = "Connection Error";
  statusText.style.color = "orange";
};

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);

  if (!data.devices) return;

  grid.innerHTML = "";

  data.devices.forEach(dev => {
    const div = document.createElement("div");
    div.className = "machine " + dev.status;
    div.innerHTML = `
      <div>
        ${dev.name}<br>
        <small>${dev.ip}</small>
      </div>
    `;
    grid.appendChild(div);
  });
};
</script>

</body>
</html>
